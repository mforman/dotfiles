# proper colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -gq allow-passthrough on
set -g visual-activity off
set-environment -g COLORTERM "truecolor"


# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind-key - split-window -v  -c '#{pane_current_path}'
bind-key \\ split-window -h  -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'
unbind '"'
unbind %

# reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded!"

# vim-tmux-navigator: seamless Alt-arrows between nvim splits and tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n M-Left  if-shell "$is_vim" 'send-keys M-Left'  'select-pane -L'
bind -n M-Down  if-shell "$is_vim" 'send-keys M-Down'  'select-pane -D'
bind -n M-Up    if-shell "$is_vim" 'send-keys M-Up'    'select-pane -U'
bind -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'select-pane -R'
bind -T copy-mode-vi M-Left  select-pane -L
bind -T copy-mode-vi M-Down  select-pane -D
bind -T copy-mode-vi M-Up    select-pane -U
bind -T copy-mode-vi M-Right select-pane -R

# Enable mouse control
set -g mouse on

# Set terminal title
set-option -g set-titles on
set-option -g set-titles-string "#S - #W"

# Alternative formats:
# "#S" - just session name
# "#S - #W" - session name and window name
# "#S:#I:#W" - session:index:window
# "tmux: #S" - prefix with "tmux"

# Rename windows automatically
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1

# Ensure window index numbers get reordered on delete.
set-option -g renumber-windows on

set -s escape-time 10
set-option -g focus-events on

set -g detach-on-destroy off

# copy and paste helpers
setw -g mode-keys vi
# clipboard command: pbcopy (macOS) default, clip.exe (WSL) / wl-copy (Wayland) override
set -g @copy_cmd 'pbcopy'
if-shell 'command -v clip.exe >/dev/null' 'set -g @copy_cmd clip.exe'
if-shell 'command -v wl-copy >/dev/null'  'set -g @copy_cmd wl-copy'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"
bind P paste-buffer

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'nvim vim ssh psql node "~claude" "~python" "~python3" btop htop lazygit'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'laktak/extrakto'

# WSL: open extracted URLs in the Windows browser (extrakto auto-picks xdg-open, absent here)
if-shell 'grep -qi microsoft /proc/version 2>/dev/null' \
  "set -g @extrakto_open_tool 'wslview'"

# config catppucin color
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=default,bold]   #S },#{#[bg=default,fg=#{@thm_red}]   #S }}"
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_green}]   #{pane_current_command} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=default,fg=#{@thm_blue}]   #{=/-10/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,   zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -g status-interval 2
set -ga status-right "#[bg=default,fg=#{@thm_mauve}]#(~/.claude/claude-status.sh)"
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=default,fg=#{@thm_green}] 󱐋#{?#{e|>=:20,#{battery_percentage}},#{#[bg=#{@thm_red},fg=default]},#{#[bg=default,fg=#{@thm_green}]}} #{battery_percentage} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=default,fg=#{@thm_maroon}] 󰭦 %d-%b 󰅐 %H:%M "

# Configure Tmux
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format "#{?#{@claude_status},#[fg=#{@thm_mauve}] #{@claude_status} ,}"
setw -g pane-border-style "bg=default,fg=#{@thm_overlay_0}"
setw -g pane-active-border-style "bg=default,fg=#{@thm_subtext_0}"
setw -g pane-border-lines single

# window content (icon + name)
set -g window-status-current-format " #I: #(~/.config/tmux/icon.sh #{pane_current_command})#{?#{!=:#{window_name},window}, #W,}  "
set -g window-status-format " #I: #(~/.config/tmux/icon.sh #{pane_current_command})#{?#{!=:#{window_name},window}, #W,}  "

# window style
set -g window-status-style "bg=default,fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=default,fg=#{@thm_flamingo}"
set -g window-status-current-style "bg=default,fg=#{@thm_peach},bold"
set -g window-status-activity-style "bg=default,fg=#{@thm_pink},bold"
set -g window-status-bell-style "bg=default,fg=#{@thm_red},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_2}]│"

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
